<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Cat Pomodoro Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="timer-container">
            <h1 id="timer-display">25:00</h1>
            <p id="timer-status">Focus Time</p>
        </div>

        <div class="companion-area" id="interactive-zone">
            <div class="cat" id="cat-character">
                <div class="ears">
                    <div class="ear left"></div>
                    <div class="ear right"></div>
                </div>
                <div class="face">
                    <div class="eyes">
                        <div class="eye" id="eye-l">
                            <div class="pupil"></div>
                        </div>
                        <div class="eye" id="eye-r">
                            <div class="pupil"></div>
                        </div>
                    </div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                    <div class="snout">
                        <div class="nose"></div>
                        <div class="mouth"></div>
                    </div>
                </div>
                <div class="body">
                    <div class="paws">
                        <div class="paw left"></div>
                        <div class="paw right"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-start" class="btn primary">Start</button>
            <button id="btn-pause" class="btn secondary">Pause</button>
            <button id="btn-reset" class="btn neutral">Reset</button>
        </div>
    </div>
    
    <div id="watermark">Made by Rishi</div>

    <script src="app.js"></script>
</body>
</html>
